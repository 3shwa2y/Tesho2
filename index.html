<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>personal information</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            overflow-x: hidden;
        }
        .background-image {
            background-image: url("photo1.jpeg");
            height: 100%;
            width: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            filter: blur(10px);
            -webkit-filter: blur(10px);
            position: fixed;
            left: 0;
            right: 0;
            z-index: -1;
            transform: scale(1.1); 
        }
        .overlay {
            background-color: rgba(0, 0, 0, 0.6); 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

       
        .main-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            text-align: center;
            padding: 20px;
        }

       
        .profile-card {
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .profile-pic-small {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
            margin-bottom: 20px;
            background-image: url('photo2.jpeg');
            background-size: cover;
            background-position: center;
            display: inline-block;
        }

        h1 {
            margin: 10px 0;
            font-size: 2.5em;
        }

        .bio {
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #ddd;
        }

 
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            transition: 0.3s;
            font-weight: bold;
            font-size: 1.1em;
        }

      
        .facebook { background-color: #1877F2; }
        .twitter { background-color: #1DA1F2; }
        .instagram { background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%); }
        .linkedin { background-color: #0077b5; }
        .whatsapp { background-color: #25D366; }

        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            opacity: 0.9;
        }

        .link-btn i {
            margin-left: 10px;
            font-size: 1.3em;
        }

    </style>
</head>
<body>

    <div class="background-image"></div>
    
    <div class="overlay"></div>

    <div class="main-container">
        <div class="profile-card">
            <div class="profile-pic-small"></div>
            
            <h1>Abdullah Mahmoud Hamdy Eltakesh</h1>
            <p class="bio">
                engineering student | shoubra universty
                <br>
            shoubra faculty of engineering
            </p>

            <div class="social-links">
                <a href="https://facebook.com/tesho.9lx.1" class="link-btn facebook" target="_blank">
                    <i class="fab fa-facebook-f"></i> facebook
                </a>
                <a href="https://instagram.com/tesho_9lx.1" class="link-btn instagram" target="_blank">
                    <i class="fab fa-instagram"></i> instagram
                </a>
                <a href="https://wa.me/201013466671" class="link-btn whatsapp" target="_blank">
                    <i class="fab fa-whatsapp"></i> whatsapp
                </a>
            </div>
        </div>
    </div>

</body>
</html>
